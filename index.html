<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accurio - The fact-checked search engine</title>
    <link rel="icon" type="image/png" size=50x50 href="Accurio Icon 32x32.ico">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: floralwhite;
            position: relative;
        }
        .bottom {
            background-color: dodgerblue;
            width: 100%;
            height: 120px;
            position: fixed;
            bottom: 0;
        }
        .image-logo {
            display: flex;
            height: 30%;
            position: absolute;
            top: 20%;
            left: 49%;
            transform: translate(-50%, -50%);
        }
        .text {
            font-family: Inter,sans-serif;
            top: 35%;
            left: 28%;
            position: absolute;
            font-weight: 500;
            line-height: 1.2;
            font-style: normal;
            clear: both;
            word-wrap: break-word;
            letter-spacing: .1px;
            font-size: 166%;
            text-align: center;
        }
        .text2 {
            font-family: Inter,sans-serif;
            top: 40%;
            left: 35%;
            position: absolute;
            font-weight: 500;
            line-height: 1.2;
            font-style: normal;
            clear: both;
            word-wrap: break-word;
            letter-spacing: .1px;
            font-size: 135%;
        }

    </style>
    
    <style>
        .button {
            width: 150px;
            height: 170px;
            background-color: #4681f4;
            border: none;
            font-size: 18px;
            cursor: pointer;
            top: 55%;
            left: 35%;
            position: absolute;
            border-radius: 10px;
        }

        .button a {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .button a img {
            width: 150px;
            height: auto;
        }
        
        .button-phone {
            width: 150px;
            height: 170px;
            background-color: #4681f4;
            border: none;
            font-size: 18px;
            cursor: pointer;
            top: 55%;
            left: 53.5%;
            position: absolute;
            border-radius: 10px;
        }

        .button-phone a {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .button-phone a img {
            width: 200px;
            height: auto;
            position: absolute;
            left: -18%;
            top: -7%;
        }
    </style>
    
    <style>
    @media only screen and (max-width: 600px) {
        .image-logo{
            top: 20%;
     }
        .text {
            top: 33%;
            left: 1%;
            font-size: 120%;
    }
        .text2 {
            top: 44%;
            left: 4%;
            font-size: 98%;
    }
        .button {
            width: 100%;
            height: auto;
            top: 55%;
            left: 5%;
            border-radius: 0;
    }
        .button-phone {
            width: 100%;
            height: auto;
            top: 55%;
            left: 65%;
            border-radius: 0;
    }
        .button a img {
            width: 80%;
            height: auto;
            left: 20%;
            position: absolute;
    }
        .button-phone a img {
            width: 80%;
            height: auto;
    }
    
        body {
            font-size: 16px;
    }

        .button, .button-phone {
            width: 40%;
            height: auto;
    }
    </style>

</head>

<body>
    <div class="image-logo">
        <img src="https://i.ibb.co/dM7ctKn/small-update.png" alt="Accurio">
    </div>

    <div class="bottom"></div>
    
    <div class="text">
        <p>Welcome to Accurio - Your Search Engine with reputable websites</p>
    </div>
    
        <div class="text2">
        <p>Please choose your device, for the best experience</p>
    </div>
    
    <div class="button">
        <a class="active" href="">
            <img src="https://cdn-icons-png.flaticon.com/512/5234/5234658.png">
        </a>
    </div>
    
    <div class="button-phone">
        <a href="">
            <img src="https://i.pinimg.com/originals/ed/94/9d/ed949da8a3b2984adfd68ea672d094fe.png">
        </a>
    </div>
</body>
</html>
